# docker-compose.swoole.yml
# ─────────────────────────────────────────────────────────────────────────────
# Quill Swoole benchmark container.
# Uses NTS PHP 8.3 + JIT tracing + Swoole HTTP server.
#
# Usage:
#   SWOOLE=1 bash scripts/bench_run.sh
#
# Or manually:
#   docker compose -f scripts/docker-compose.swoole.yml up --build
#   ab -n 200000 -c 500 -k http://localhost:8080/hello
#   docker compose -f scripts/docker-compose.swoole.yml down
# ─────────────────────────────────────────────────────────────────────────────

services:
  quill_swoole:
    build:
      context: ..
      dockerfile: scripts/Dockerfile.swoole
    ports:
      - "${SWOOLE_BENCH_PORT:-8080}:8080"
    environment:
      # Worker count: (host_cpus - h2load_threads) for benchmarking.
      SWOOLE_WORKERS: "${SWOOLE_WORKERS:-4}"
      SWOOLE_PORT: "8080"
      QUILL_GC_INTERVAL: "${QUILL_GC_INTERVAL:-0}"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 15s

