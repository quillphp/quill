# docker-compose.bench.yml
# ─────────────────────────────────────────────────────────────────────────────
# Spins up the FrankenPHP worker container for production-grade benchmarking.
#
# Usage (from quill/ directory):
#   DOCKER=1 bash scripts/bench_run.sh
#
# Or manually:
#   docker compose -f scripts/docker-compose.bench.yml up --build
#   h2load -k -c 100 -t 4 -m 10 -D 10 https://127.0.0.1:8443/hello
#   docker compose -f scripts/docker-compose.bench.yml down
# ─────────────────────────────────────────────────────────────────────────────

services:
  quill_bench:
    build:
      context: ..                           # build context = quill/
      dockerfile: scripts/Dockerfile.bench
    ports:
      - "${DOCKER_PORT:-8443}:443"
      - "${BENCH_PORT:-8080}:8080"
    environment:
      # SERVER_NAME is consumed by the FrankenPHP base image's entrypoint.
      SERVER_NAME: "localhost"
      # PHP worker count. For benchmarking: set to (host_cpus - h2load_threads).
      # For production (no co-located benchmarker): use 2× vCPU count.
      FRANKENPHP_NUM_WORKERS: "${FRANKENPHP_NUM_WORKERS:-4}"
      # GC throttle interval (requests between gc_collect_cycles calls).
      # Set to 0 to disable GC entirely (safe when max_requests recycles workers).
      QUILL_GC_INTERVAL: "${QUILL_GC_INTERVAL:-0}"
    healthcheck:
      # curl -k = accept self-signed TLS cert (HTTPS health-check inside container)
      test: ["CMD", "curl", "-kfs", "https://localhost/health"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 10s

