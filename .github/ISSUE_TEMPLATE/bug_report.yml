name: Bug Report
description: Create a report to help us improve the framework
title: '[Bug]: '
labels: [bug, unconfirmed]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what happens...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Install quill
        2. Create a handler...
        3. Dispatch a request...
    validations:
      required: true
  - type: input
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: php_version
    attributes:
      label: PHP Version
      description: Which version of PHP are you running?
      placeholder: e.g. 8.3.1
    validations:
      required: true
  - type: input
    id: quill_version
    attributes:
      label: Quill Version
      description: Which version of QuillPHP are you using?
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Docker
    validations:
      required: true
