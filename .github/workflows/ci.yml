name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'attributes/**'
      - 'dtos/**'
      - 'handlers/**'
      - 'public/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon'
      - 'phpunit.xml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Pest) — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, openssl, opcache, apcu, ffi
          ini-values: opcache.enable_cli=1, apc.enable_cli=1, ffi.enable=on
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Build Native Core from Vendor
        run: |
          cd vendor/quillphp/quill-core
          cargo build --release
          echo "QUILL_CORE_BINARY=$(pwd)/target/release/libquill_core.so" >> $GITHUB_ENV
          echo "QUILL_CORE_HEADER=$(pwd)/quill.h" >> $GITHUB_ENV
          ls -R .

      - name: Run Tests (Pest)
        run: vendor/bin/pest --no-coverage

  phpstan:
    name: PHPStan (level 6)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, openssl, apcu
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-8.3-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.3-

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress
