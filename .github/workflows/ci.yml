name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'attributes/**'
      - 'dtos/**'
      - 'handlers/**'
      - 'public/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon'
      - 'phpunit.xml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]

jobs:
  pr-linter:
    name: PR Content Linter
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Checklist Content
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return core.setFailed("No Pull Request context found.");
            const body = pr.body || "";

            // Split body into sections by ## headers
            const sections = body.split(/^## /m);
            const checklistSection = sections.find(s => s.toLowerCase().startsWith("checklist"));
            const typeSection = sections.find(s => s.toLowerCase().startsWith("type of change"));

            // 1. Validate Checklist Section (Mandatory & All must be checked)
            if (!checklistSection) return core.setFailed("Pull Request description is missing the '## Checklist' section.");
            const unchecked = (checklistSection.match(/- \[ \] /g) || []).length;
            if (unchecked > 0) return core.setFailed(`There are ${unchecked} unchecked items in your '## Checklist'. Please ensure all project standards are met.`);

            // 2. Validate Type of Change (At least one must be checked)
            if (typeSection) {
              const checked = (typeSection.match(/- \[x\] /gi) || []).length;
              if (checked === 0 && typeSection.includes("- [ ] ")) {
                return core.setFailed("Please select at least one 'Type of change' or follow the template instructions to delete irrelevant options.");
              }
            }

  test:
    name: Tests (Pest) — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, openssl, opcache, apcu, ffi
          ini-values: opcache.enable_cli=1, apc.enable_cli=1, ffi.enable=on
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Build Native Core from Vendor
        run: |
          cd vendor/quillphp/quill-core
          cargo build --release
          echo "QUILL_CORE_BINARY=$(pwd)/target/release/libquill_core.so" >> $GITHUB_ENV
          echo "QUILL_CORE_HEADER=$(pwd)/quill.h" >> $GITHUB_ENV
          ls -R .

      - name: Run Tests (Pest)
        run: vendor/bin/pest --no-coverage

  phpstan:
    name: PHPStan (level 9)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, openssl, apcu
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-8.3-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.3-

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  benchmark:
    name: Benchmark — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        php: ['8.3']

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, openssl, opcache, apcu, ffi
          ini-values: opcache.enable_cli=1, apc.enable_cli=1, ffi.enable=on
          coverage: none

      - name: Install wrk
        run: sudo apt-get update && sudo apt-get install -y wrk

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Build Native Core from Vendor
        run: |
          cd vendor/quillphp/quill-core
          cargo build --release
          echo "QUILL_CORE_BINARY=$(pwd)/target/release/libquill_core.so" >> $GITHUB_ENV
          echo "QUILL_CORE_HEADER=$(pwd)/quill.h" >> $GITHUB_ENV

      - name: Run Benchmark
        run: composer bench
        env:
          DURATION: 5
          THREADS: 2
          CONNECTIONS: 50
