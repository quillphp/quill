name: Benchmark

# ─────────────────────────────────────────────────────────────────────────────
# Six benchmark jobs:
#
#  QuillPHP (baseline)
#  ───────────────────
#  1. bench-inprocess        — pure dispatch overhead, zero HTTP (always fast)
#  2. bench-native-swoole    — Swoole directly on the Linux runner, no Docker.
#                              Target: 65,000 req/s on an 8-core runner.
#  3. bench-builtin          — PHP built-in server (HTTP/1.1 + JIT)
#
#  Framework Comparisons
#  ─────────────────────
#  4. bench-compare-gofiber     — Go 1.22 + Fiber v2 (fasthttp)
#  5. bench-compare-fastapi     — Python 3.12 + FastAPI + Uvicorn
#  6. bench-compare-laravel     — PHP 8.3 + Laravel Octane (Swoole)
#  7. bench-compare-frankenphp  — FrankenPHP worker mode (PHP-ZTS, no JIT)
#
# Runners
# ───────
# Default:  ubuntu-latest (2 vCPU)  → expect ~10–18k req/s
# 8-core:   ubuntu-latest-8-cores   → expect ~60–75k req/s  ← 65k target
# Self-hosted:                          set runner input to your label
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      runner:
        description: |
          Runner label.
          GitHub-hosted: ubuntu-latest | ubuntu-latest-4-cores | ubuntu-latest-8-cores
          Self-hosted:   your custom label (e.g. prod-bench)
        required: false
        default: 'ubuntu-latest'
      duration:
        description: 'Benchmark duration (seconds per route)'
        required: false
        default: '15'
      connections:
        description: 'Concurrent connections'
        required: false
        default: '200'
      threads:
        description: 'wrk client threads'
        required: false
        default: '2'
      workers:
        description: 'Swoole workers (0 = auto: nproc - threads - 1)'
        required: false
        default: '0'
      min_rps:
        description: 'Performance floor — fail if GET /hello drops below this req/s'
        required: false
        default: '5000'

  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'handlers/**'
      - '.github/infra/bench_server.php'
      - '.github/infra/swoole_bench.php'
      - '.github/infra/benchmark.php'
      - '.github/infra/Dockerfile.swoole'
      - '.github/workflows/benchmark.yml'

  schedule:
    # Weekly on Monday 06:00 UTC — track performance drift over time
    - cron: '0 6 * * 1'

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: In-process micro-benchmark
# Measures pure framework dispatch overhead with zero HTTP cost.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  bench-inprocess:
    name: QuillPHP / In-Process Benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, openssl, opcache
          ini-values: |
            opcache.enable=1
            opcache.enable_cli=1
            opcache.jit=tracing
            opcache.jit_buffer_size=128M
            opcache.validate_timestamps=0
            opcache.memory_consumption=128
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-bench-${{ hashFiles('composer.lock') }}
          restore-keys: composer-bench-

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --classmap-authoritative --no-interaction --no-progress

      - name: Run in-process benchmark
        run: |
          echo "## QuillPHP — In-Process Benchmark | PHP 8.3 + JIT" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          php .github/infra/benchmark.php 2>&1 | tee /tmp/inproc.txt
          cat /tmp/inproc.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Runner: \`ubuntu-latest\` · PHP 8.3 NTS + JIT · $(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_STEP_SUMMARY"

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Native Swoole — production-like Linux benchmark (THE 65k target)
#
# Swoole is installed DIRECTLY on the Linux runner via setup-php (no Docker).
# This eliminates container network overhead and gives numbers closest to a
# real production deployment.
#
# Default runner (2 vCPU ubuntu-latest): ~10–18k req/s
# ubuntu-latest-4-cores (4 vCPU):        ~30–45k req/s
# ubuntu-latest-8-cores (8 vCPU):        ~60–75k req/s  ← 65k target
# Self-hosted production server:          your real numbers
# ─────────────────────────────────────────────────────────────────────────────
  bench-native-swoole:
    name: QuillPHP / Swoole Native (Bare Metal)
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      # NTS (non-thread-safe) PHP is required for JIT.
      # FrankenPHP uses ZTS and cannot use JIT — Swoole NTS is the fast path.
      - name: Install PHP 8.3 NTS + Swoole + JIT
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: swoole, opcache
          ini-values: |
            opcache.enable=1
            opcache.enable_cli=1
            opcache.jit=tracing
            opcache.jit_buffer_size=256M
            opcache.validate_timestamps=0
            opcache.save_comments=0
            opcache.memory_consumption=256
            opcache.interned_strings_buffer=32
            realpath_cache_size=4096K
            realpath_cache_ttl=600
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-swoole-${{ hashFiles('composer.lock') }}
          restore-keys: composer-swoole-

      - name: Install dependencies (classmap-authoritative, no dev)
        run: composer install --no-dev --optimize-autoloader --classmap-authoritative --no-interaction --no-progress

      # wrk is the HTTP benchmark tool. It may or may not be in apt on the
      # runner's Ubuntu version — we build from source as a reliable fallback.
      - name: Install wrk
        run: |
          if sudo apt-get install -y wrk 2>/dev/null; then
            echo "wrk installed via apt."
          else
            echo "apt package unavailable — building wrk from source..."
            sudo apt-get install -y build-essential libssl-dev git
            git clone --depth 1 -b 4.2.0 https://github.com/wg/wrk /tmp/wrk
            make -C /tmp/wrk -j"$(nproc)"
            sudo install /tmp/wrk/wrk /usr/local/bin/wrk
          fi
          wrk --version 2>&1 | head -1 || true

      # Apply the same TCP kernel settings as .github/infra/linux_tune.sh.
      # GitHub Actions runners have sudo. We use || true so restricted
      # environments don't abort the job.
      - name: Apply Linux kernel tuning
        run: |
          sudo sysctl -w net.core.somaxconn=65535          2>/dev/null || true
          sudo sysctl -w net.core.netdev_max_backlog=65535  2>/dev/null || true
          sudo sysctl -w net.ipv4.tcp_max_syn_backlog=65535 2>/dev/null || true
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1            2>/dev/null || true
          sudo sysctl -w net.ipv4.tcp_fin_timeout=15        2>/dev/null || true
          sudo sysctl -w net.core.rmem_max=134217728        2>/dev/null || true
          sudo sysctl -w net.core.wmem_max=134217728        2>/dev/null || true
          sudo sysctl -w net.ipv4.tcp_fastopen=3            2>/dev/null || true
          sudo bash -c 'echo never > /sys/kernel/mm/transparent_hugepage/enabled' 2>/dev/null || true
          echo "Kernel tuning applied."

      # SWOOLE_MODE=base: each worker accepts connections directly (SO_REUSEPORT).
      # Eliminates the master-process dispatch pipe — the single biggest
      # SWOOLE_PROCESS overhead on Linux.
      - name: Start Swoole server (SWOOLE_BASE, native Linux)
        run: |
          NCPUS=$(nproc)
          INPUT_WORKERS="${{ github.event.inputs.workers }}"
          INPUT_THREADS="${{ github.event.inputs.threads || '2' }}"

          if [ "${INPUT_WORKERS}" = "0" ] || [ -z "${INPUT_WORKERS}" ]; then
            # Leave wrk threads + 1 core for OS/system
            WORKERS=$(( NCPUS - INPUT_THREADS - 1 ))
            [ "${WORKERS}" -lt 1 ] && WORKERS=1
          else
            WORKERS="${INPUT_WORKERS}"
          fi

          echo "Runner: ${NCPUS} vCPU | Swoole workers: ${WORKERS} | wrk threads: ${INPUT_THREADS}"
          echo "SWOOLE_WORKERS_USED=${WORKERS}" >> "$GITHUB_ENV"

          SWOOLE_WORKERS="${WORKERS}" \
          SWOOLE_PORT=8080 \
          SWOOLE_MODE=base \
          QUILL_GC_INTERVAL=0 \
          SWOOLE_MAX_REQUEST=0 \
          php .github/infra/swoole_bench.php > /tmp/swoole.log 2>&1 &

          echo "SWOOLE_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for Swoole readiness
        run: |
          for i in $(seq 1 80); do
            curl -sf http://127.0.0.1:8080/health > /dev/null 2>&1 && echo "Swoole ready." && exit 0
            sleep 0.5
          done
          echo "=== Swoole startup log ===" && cat /tmp/swoole.log
          exit 1

      - name: Warmup
        run: |
          # Parallel warmup via wrk — much faster than 3000 sequential curls.
          # 5 seconds at 50 concurrent connections lets JIT start tracing.
          echo "Warming up Swoole workers (5s, 50 concurrent)..."
          wrk -t1 -c50 -d5s http://127.0.0.1:8080/hello > /dev/null
          echo "Warmup complete."

      - name: Run wrk benchmarks
        env:
          DURATION:    ${{ github.event.inputs.duration    || '15' }}
          CONNECTIONS: ${{ github.event.inputs.connections || '200' }}
          THREADS:     ${{ github.event.inputs.threads     || '2' }}
        run: |
          NCPUS=$(nproc)

          {
            echo "## QuillPHP — Swoole Native | PHP 8.3 + JIT (SWOOLE_BASE)"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Runner | \`${{ github.event.inputs.runner || 'ubuntu-latest' }}\` |"
            echo "| vCPUs | ${NCPUS} |"
            echo "| Swoole workers | ${SWOOLE_WORKERS_USED} (SWOOLE_BASE) |"
            echo "| PHP | 8.3 NTS + JIT tracing (256 MB buffer) |"
            echo "| Autoloader | classmap-authoritative |"
            echo "| Duration | ${DURATION}s per route |"
            echo "| Connections | ${CONNECTIONS} concurrent |"
            echo "| wrk threads | ${THREADS} |"
            echo ""
            echo "| Route | Handler | Req/s | Latency (avg) | Transfer/s |"
            echo "|-------|---------|------:|--------------:|-----------:|"
          } >> "$GITHUB_STEP_SUMMARY"

          run_wrk() {
            local label="$1" handler="$2" url="$3"; shift 3
            local out rps lat transfer
            out=$(wrk -t"${THREADS}" -c"${CONNECTIONS}" -d"${DURATION}s" "$@" "${url}" 2>&1)
            echo "=== ${label} ===" && echo "${out}" && echo ""
            rps=$(echo      "${out}" | grep -oP 'Requests/sec:\s+\K[\d.]+' || echo "?")
            lat=$(echo      "${out}" | grep -oP 'Latency\s+\K[\d.]+[µm]?s' | head -1 || echo "?")
            transfer=$(echo "${out}" | grep -oP 'Transfer/sec:\s+\K\S+' || echo "?")
            echo "| \`${label}\` | \`${handler}\` | **${rps}** | ${lat} | ${transfer} |" >> "$GITHUB_STEP_SUMMARY"
            if [ "${label}" = "GET /hello" ]; then
              echo "HELLO_RPS=${rps}" >> "$GITHUB_ENV"
            fi
          }

          run_wrk "GET /hello"    "BenchHandler::hello" "http://127.0.0.1:8080/hello"
          run_wrk "GET /users/42" "BenchHandler::user"  "http://127.0.0.1:8080/users/42"
          run_wrk "POST /echo"    "BenchHandler::echo"  "http://127.0.0.1:8080/echo" \
            -s .github/infra/bench_post.lua

          {
            echo ""
            echo "---"
            echo "> $(date -u '+%Y-%m-%d %H:%M UTC') · commit \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # Fail if req/s falls below the configured floor.
      # Default 5000 is safe for a 2-core ubuntu-latest runner.
      # Set min_rps=50000 when targeting ubuntu-latest-8-cores.
      - name: Performance regression check
        env:
          MIN_RPS: ${{ github.event.inputs.min_rps || '5000' }}
        run: |
          RPS_INT=$(echo "${HELLO_RPS:-0}" | grep -oP '^\d+' || echo "0")
          echo "GET /hello: ${HELLO_RPS} req/s  (floor: ${MIN_RPS} req/s)"
          if [ "${RPS_INT}" -lt "${MIN_RPS}" ]; then
            echo "::error::Performance regression: ${HELLO_RPS} req/s < ${MIN_RPS} req/s floor."
            echo "::error::Use a larger runner (ubuntu-latest-8-cores) or lower min_rps."
            exit 1
          fi
          echo "✓ Floor passed: ${HELLO_RPS} req/s ≥ ${MIN_RPS} req/s"

      - name: Save benchmark results artifact
        if: always()
        run: |
          mkdir -p /tmp/bench-results
          cat > /tmp/bench-results/result.json << JSON
          {
            "run_id":         "${{ github.run_id }}",
            "sha":            "${{ github.sha }}",
            "ref":            "${{ github.ref_name }}",
            "runner":         "${{ github.event.inputs.runner || 'ubuntu-latest' }}",
            "timestamp":      "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "vcpus":          $(nproc),
            "swoole_workers": ${SWOOLE_WORKERS_USED:-0},
            "hello_rps":      "${HELLO_RPS:-?}"
          }
          JSON

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-results-${{ github.run_id }}
          path: /tmp/bench-results/
          retention-days: 90

      - name: Stop Swoole server
        if: always()
        run: kill "${SWOOLE_PID}" 2>/dev/null || true

# ─────────────────────────────────────────────────────────────────────────────
# Job 3: PHP built-in server baseline
# Low-water mark comparison. Shows the framework overhead without Swoole.
# ─────────────────────────────────────────────────────────────────────────────
  bench-builtin:
    name: QuillPHP / PHP Built-In Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, openssl, opcache
          ini-values: |
            opcache.enable=1
            opcache.enable_cli=1
            opcache.jit=tracing
            opcache.jit_buffer_size=128M
            opcache.validate_timestamps=0
          coverage: none

      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-bench-${{ hashFiles('composer.lock') }}
          restore-keys: composer-bench-

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --classmap-authoritative --no-interaction --no-progress

      - name: Install wrk
        run: |
          if sudo apt-get install -y wrk 2>/dev/null; then
            echo "wrk installed via apt."
          else
            sudo apt-get install -y build-essential libssl-dev git
            git clone --depth 1 -b 4.2.0 https://github.com/wg/wrk /tmp/wrk
            make -C /tmp/wrk -j"$(nproc)"
            sudo install /tmp/wrk/wrk /usr/local/bin/wrk
          fi

      - name: Start PHP built-in server (nproc workers + JIT)
        run: |
          PHP_CLI_SERVER_WORKERS=$(nproc) \
            php -S 127.0.0.1:8765 .github/infra/bench_server.php > /tmp/phpserver.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for readiness
        run: |
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:8765/health > /dev/null 2>&1 && echo "Ready." && exit 0
            sleep 0.5
          done
          cat /tmp/phpserver.log && exit 1

      - name: Warmup
        run: |
          echo "Warming up built-in server (3s, 20 concurrent)..."
          wrk -t1 -c20 -d3s http://127.0.0.1:8765/hello > /dev/null
          echo "Warmup complete."

      - name: Run wrk benchmark
        env:
          DURATION:    ${{ github.event.inputs.duration    || '15' }}
          CONNECTIONS: ${{ github.event.inputs.connections || '100' }}
          THREADS:     ${{ github.event.inputs.threads     || '2' }}
        run: |
          {
            echo "## QuillPHP — PHP Built-In Server | PHP 8.3 + JIT ($(nproc) workers)"
            echo ""
            echo "| Route | Req/s | Latency (avg) | Transfer/s |"
            echo "|-------|------:|--------------:|-----------:|"
          } >> "$GITHUB_STEP_SUMMARY"

          run_wrk() {
            local label="$1" url="$2"; shift 2
            local out rps lat transfer
            out=$(wrk -t"${THREADS}" -c"${CONNECTIONS}" -d"${DURATION}s" "$@" "${url}" 2>&1)
            echo "=== ${label} ===" && echo "${out}" && echo ""
            rps=$(echo      "${out}" | grep -oP 'Requests/sec:\s+\K[\d.]+' || echo "?")
            lat=$(echo      "${out}" | grep -oP 'Latency\s+\K[\d.]+[µm]?s' | head -1 || echo "?")
            transfer=$(echo "${out}" | grep -oP 'Transfer/sec:\s+\K\S+' || echo "?")
            echo "| \`${label}\` | **${rps}** | ${lat} | ${transfer} |" >> "$GITHUB_STEP_SUMMARY"
          }

          run_wrk "GET /hello"    "http://127.0.0.1:8765/hello"
          run_wrk "GET /users/42" "http://127.0.0.1:8765/users/42"
          run_wrk "POST /echo"    "http://127.0.0.1:8765/echo" -s .github/infra/bench_post.lua

          {
            echo ""
            echo "---"
            echo "> Runner: \`ubuntu-latest\` · PHP 8.3 NTS + JIT · $(date -u '+%Y-%m-%d %H:%M UTC')"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop server
        if: always()
        run: kill "${SERVER_PID}" 2>/dev/null || true

# ─────────────────────────────────────────────────────────────────────────────
# Job 4: Go Fiber comparison
# Idiomatic Go HTTP using the Fiber framework (fasthttp underneath).
# Goroutine-based concurrency naturally uses all available CPUs.
# ─────────────────────────────────────────────────────────────────────────────
  bench-compare-gofiber:
    name: Go Fiber / HTTP Benchmark
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install wrk
        run: |
          if sudo apt-get install -y wrk 2>/dev/null; then
            echo "wrk installed via apt."
          else
            sudo apt-get install -y build-essential libssl-dev git
            git clone --depth 1 -b 4.2.0 https://github.com/wg/wrk /tmp/wrk
            make -C /tmp/wrk -j"$(nproc)"
            sudo install /tmp/wrk/wrk /usr/local/bin/wrk
          fi
          wrk --version 2>&1 | head -1 || true

      - name: Build Go Fiber server
        run: |
          mkdir -p /tmp/gofiber
          cat > /tmp/gofiber/main.go << 'GOEOF'
          package main

          import "github.com/gofiber/fiber/v2"

          func main() {
              app := fiber.New(fiber.Config{DisableStartupMessage: true})
              app.Get("/health", func(c *fiber.Ctx) error {
                  return c.SendString("ok")
              })
              app.Get("/hello", func(c *fiber.Ctx) error {
                  return c.JSON(fiber.Map{"message": "Hello, World!"})
              })
              app.Get("/users/:id", func(c *fiber.Ctx) error {
                  return c.JSON(fiber.Map{"id": c.Params("id"), "name": "Test User"})
              })
              app.Post("/echo", func(c *fiber.Ctx) error {
                  return c.Send(c.Body())
              })
              _ = app.Listen(":8081")
          }
          GOEOF
          cd /tmp/gofiber
          go mod init gofiber-bench
          go get github.com/gofiber/fiber/v2@latest
          go mod tidy
          go build -o server .

      - name: Start Go Fiber server
        run: |
          /tmp/gofiber/server &
          echo "FIBER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for readiness
        run: |
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:8081/health > /dev/null 2>&1 && echo "Go Fiber ready." && exit 0
            sleep 0.5
          done
          echo "Go Fiber failed to start." && exit 1

      - name: Warmup
        run: |
          echo "Warming up Go Fiber (5s, 50 concurrent)..."
          wrk -t1 -c50 -d5s http://127.0.0.1:8081/hello > /dev/null
          echo "Warmup complete."

      - name: Run wrk benchmarks
        env:
          DURATION:    ${{ github.event.inputs.duration    || '15' }}
          CONNECTIONS: ${{ github.event.inputs.connections || '200' }}
          THREADS:     ${{ github.event.inputs.threads     || '2' }}
        run: |
          NCPUS=$(nproc)
          GOVER=$(go version | awk '{print $3}')
          {
            echo "## Go Fiber — HTTP Benchmark Results"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Runner | \`${{ github.event.inputs.runner || 'ubuntu-latest' }}\` |"
            echo "| vCPUs | ${NCPUS} |"
            echo "| Go | ${GOVER} |"
            echo "| Duration | ${DURATION}s per route |"
            echo "| Connections | ${CONNECTIONS} concurrent |"
            echo "| wrk threads | ${THREADS} |"
            echo ""
            echo "| Route | Req/s | Latency (avg) | Transfer/s |"
            echo "|-------|------:|--------------:|-----------:|"
          } >> "$GITHUB_STEP_SUMMARY"

          run_wrk() {
            local label="$1" url="$2"; shift 2
            local out rps lat transfer
            out=$(wrk -t"${THREADS}" -c"${CONNECTIONS}" -d"${DURATION}s" "$@" "${url}" 2>&1)
            echo "=== ${label} ===" && echo "${out}" && echo ""
            rps=$(echo      "${out}" | grep -oP 'Requests/sec:\s+\K[\d.]+' || echo "?")
            lat=$(echo      "${out}" | grep -oP 'Latency\s+\K[\d.]+[µm]?s' | head -1 || echo "?")
            transfer=$(echo "${out}" | grep -oP 'Transfer/sec:\s+\K\S+' || echo "?")
            echo "| \`${label}\` | **${rps}** | ${lat} | ${transfer} |" >> "$GITHUB_STEP_SUMMARY"
          }

          run_wrk "GET /hello"    "http://127.0.0.1:8081/hello"
          run_wrk "GET /users/42" "http://127.0.0.1:8081/users/42"
          run_wrk "POST /echo"    "http://127.0.0.1:8081/echo" -s .github/infra/bench_post.lua

          {
            echo ""
            echo "---"
            echo "> $(date -u '+%Y-%m-%d %H:%M UTC') · commit \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop Go Fiber server
        if: always()
        run: kill "${FIBER_PID}" 2>/dev/null || true

# ─────────────────────────────────────────────────────────────────────────────
# Job 5: FastAPI + Uvicorn comparison
# Python async ASGI framework. Multiple uvicorn worker processes (one per CPU).
# ─────────────────────────────────────────────────────────────────────────────
  bench-compare-fastapi:
    name: FastAPI + Uvicorn / HTTP Benchmark
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install FastAPI + Uvicorn
        run: pip install fastapi "uvicorn[standard]"

      - name: Install wrk
        run: |
          if sudo apt-get install -y wrk 2>/dev/null; then
            echo "wrk installed via apt."
          else
            sudo apt-get install -y build-essential libssl-dev git
            git clone --depth 1 -b 4.2.0 https://github.com/wg/wrk /tmp/wrk
            make -C /tmp/wrk -j"$(nproc)"
            sudo install /tmp/wrk/wrk /usr/local/bin/wrk
          fi
          wrk --version 2>&1 | head -1 || true

      - name: Create FastAPI server
        run: |
          cat > /tmp/fastapi_server.py << 'PYEOF'
          from fastapi import FastAPI, Request
          from fastapi.responses import Response

          app = FastAPI()

          @app.get("/health")
          async def health():
              return Response(content=b"ok")

          @app.get("/hello")
          async def hello():
              return {"message": "Hello, World!"}

          @app.get("/users/{user_id}")
          async def get_user(user_id: int):
              return {"id": user_id, "name": "Test User"}

          @app.post("/echo")
          async def echo(request: Request):
              body = await request.body()
              return Response(content=body, media_type="application/octet-stream")
          PYEOF

      - name: Start FastAPI server
        run: |
          WORKERS=$(nproc)
          echo "Starting FastAPI with ${WORKERS} uvicorn workers..."
          uvicorn fastapi_server:app \
            --host 127.0.0.1 --port 8082 \
            --workers "${WORKERS}" \
            --app-dir /tmp \
            --no-access-log \
            > /tmp/fastapi.log 2>&1 &
          echo "FASTAPI_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for readiness
        run: |
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:8082/health > /dev/null 2>&1 && echo "FastAPI ready." && exit 0
            sleep 0.5
          done
          echo "=== FastAPI startup log ===" && cat /tmp/fastapi.log && exit 1

      - name: Warmup
        run: |
          echo "Warming up FastAPI (5s, 50 concurrent)..."
          wrk -t1 -c50 -d5s http://127.0.0.1:8082/hello > /dev/null
          echo "Warmup complete."

      - name: Run wrk benchmarks
        env:
          DURATION:    ${{ github.event.inputs.duration    || '15' }}
          CONNECTIONS: ${{ github.event.inputs.connections || '200' }}
          THREADS:     ${{ github.event.inputs.threads     || '2' }}
        run: |
          NCPUS=$(nproc)
          PYVER=$(python --version 2>&1 | awk '{print $2}')
          {
            echo "## FastAPI + Uvicorn — HTTP Benchmark Results"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Runner | \`${{ github.event.inputs.runner || 'ubuntu-latest' }}\` |"
            echo "| vCPUs | ${NCPUS} |"
            echo "| Python | ${PYVER} |"
            echo "| Uvicorn workers | ${NCPUS} |"
            echo "| Duration | ${DURATION}s per route |"
            echo "| Connections | ${CONNECTIONS} concurrent |"
            echo "| wrk threads | ${THREADS} |"
            echo ""
            echo "| Route | Req/s | Latency (avg) | Transfer/s |"
            echo "|-------|------:|--------------:|-----------:|"
          } >> "$GITHUB_STEP_SUMMARY"

          run_wrk() {
            local label="$1" url="$2"; shift 2
            local out rps lat transfer
            out=$(wrk -t"${THREADS}" -c"${CONNECTIONS}" -d"${DURATION}s" "$@" "${url}" 2>&1)
            echo "=== ${label} ===" && echo "${out}" && echo ""
            rps=$(echo      "${out}" | grep -oP 'Requests/sec:\s+\K[\d.]+' || echo "?")
            lat=$(echo      "${out}" | grep -oP 'Latency\s+\K[\d.]+[µm]?s' | head -1 || echo "?")
            transfer=$(echo "${out}" | grep -oP 'Transfer/sec:\s+\K\S+' || echo "?")
            echo "| \`${label}\` | **${rps}** | ${lat} | ${transfer} |" >> "$GITHUB_STEP_SUMMARY"
          }

          run_wrk "GET /hello"    "http://127.0.0.1:8082/hello"
          run_wrk "GET /users/42" "http://127.0.0.1:8082/users/42"
          run_wrk "POST /echo"    "http://127.0.0.1:8082/echo" -s .github/infra/bench_post.lua

          {
            echo ""
            echo "---"
            echo "> $(date -u '+%Y-%m-%d %H:%M UTC') · commit \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop FastAPI server
        if: always()
        run: kill "${FASTAPI_PID}" 2>/dev/null || true

# ─────────────────────────────────────────────────────────────────────────────
# Job 6: Laravel Octane (Swoole) comparison
# Full Laravel framework stack served via Octane + Swoole.
# Identical PHP/Swoole/JIT settings as bench-native-swoole for a fair PHP-to-PHP
# comparison — the delta shows QuillPHP's framework overhead advantage.
# ─────────────────────────────────────────────────────────────────────────────
  bench-compare-laravel:
    name: Laravel Octane (Swoole) / HTTP Benchmark
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: swoole, opcache
          ini-values: |
            opcache.enable=1
            opcache.enable_cli=1
            opcache.jit=tracing
            opcache.jit_buffer_size=256M
            opcache.validate_timestamps=0
            opcache.save_comments=0
            opcache.memory_consumption=256
            opcache.interned_strings_buffer=32
            realpath_cache_size=4096K
            realpath_cache_ttl=600
          coverage: none

      - name: Install wrk
        run: |
          if sudo apt-get install -y wrk 2>/dev/null; then
            echo "wrk installed via apt."
          else
            sudo apt-get install -y build-essential libssl-dev git
            git clone --depth 1 -b 4.2.0 https://github.com/wg/wrk /tmp/wrk
            make -C /tmp/wrk -j"$(nproc)"
            sudo install /tmp/wrk/wrk /usr/local/bin/wrk
          fi
          wrk --version 2>&1 | head -1 || true

      - name: Create Laravel project + install Octane
        run: |
          composer create-project laravel/laravel /tmp/laravel-bench \
            --prefer-dist --no-interaction --quiet
          cd /tmp/laravel-bench
          # Ensure APP_KEY is set (create-project runs this, but be explicit)
          php artisan key:generate --no-interaction
          composer require laravel/octane --no-interaction --quiet
          php artisan octane:install --server=swoole --no-interaction

      - name: Register benchmark routes
        run: |
          cat > /tmp/laravel-bench/routes/web.php << 'PHPEOF'
          <?php
          use Illuminate\Support\Facades\Route;
          use Illuminate\Http\Request;

          Route::get('/health', fn () => response('ok'));
          Route::get('/hello',  fn () => response()->json(['message' => 'Hello, World!']));
          Route::get('/users/{id}', fn ($id) => response()->json(['id' => (int) $id, 'name' => 'Test User']));
          Route::post('/echo', fn (Request $r) => response($r->getContent(), 200, ['Content-Type' => 'application/octet-stream']));
          PHPEOF

      - name: Start Laravel Octane server
        run: |
          NCPUS=$(nproc)
          INPUT_THREADS="${{ github.event.inputs.threads || '2' }}"
          WORKERS=$(( NCPUS - INPUT_THREADS - 1 ))
          [ "${WORKERS}" -lt 1 ] && WORKERS=1
          echo "Runner: ${NCPUS} vCPU | Octane workers: ${WORKERS}"
          echo "LARAVEL_WORKERS_USED=${WORKERS}" >> "$GITHUB_ENV"
          cd /tmp/laravel-bench
          php artisan octane:start \
            --server=swoole \
            --host=127.0.0.1 \
            --port=8083 \
            --workers="${WORKERS}" \
            > /tmp/laravel.log 2>&1 &
          echo "LARAVEL_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for readiness
        run: |
          for i in $(seq 1 80); do
            curl -sf http://127.0.0.1:8083/health > /dev/null 2>&1 && echo "Laravel Octane ready." && exit 0
            sleep 0.5
          done
          echo "=== Laravel Octane startup log ===" && cat /tmp/laravel.log && exit 1

      - name: Warmup
        run: |
          echo "Warming up Laravel Octane (5s, 50 concurrent)..."
          wrk -t1 -c50 -d5s http://127.0.0.1:8083/hello > /dev/null
          echo "Warmup complete."

      - name: Run wrk benchmarks
        env:
          DURATION:    ${{ github.event.inputs.duration    || '15' }}
          CONNECTIONS: ${{ github.event.inputs.connections || '200' }}
          THREADS:     ${{ github.event.inputs.threads     || '2' }}
        run: |
          NCPUS=$(nproc)
          {
            echo "## Laravel Octane (Swoole) — HTTP Benchmark Results"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Runner | \`${{ github.event.inputs.runner || 'ubuntu-latest' }}\` |"
            echo "| vCPUs | ${NCPUS} |"
            echo "| Octane workers | ${LARAVEL_WORKERS_USED} (Swoole) |"
            echo "| PHP | 8.3 NTS + JIT tracing (256 MB buffer) |"
            echo "| Duration | ${DURATION}s per route |"
            echo "| Connections | ${CONNECTIONS} concurrent |"
            echo "| wrk threads | ${THREADS} |"
            echo ""
            echo "| Route | Req/s | Latency (avg) | Transfer/s |"
            echo "|-------|------:|--------------:|-----------:|"
          } >> "$GITHUB_STEP_SUMMARY"

          run_wrk() {
            local label="$1" url="$2"; shift 2
            local out rps lat transfer
            out=$(wrk -t"${THREADS}" -c"${CONNECTIONS}" -d"${DURATION}s" "$@" "${url}" 2>&1)
            echo "=== ${label} ===" && echo "${out}" && echo ""
            rps=$(echo      "${out}" | grep -oP 'Requests/sec:\s+\K[\d.]+' || echo "?")
            lat=$(echo      "${out}" | grep -oP 'Latency\s+\K[\d.]+[µm]?s' | head -1 || echo "?")
            transfer=$(echo "${out}" | grep -oP 'Transfer/sec:\s+\K\S+' || echo "?")
            echo "| \`${label}\` | **${rps}** | ${lat} | ${transfer} |" >> "$GITHUB_STEP_SUMMARY"
          }

          run_wrk "GET /hello"    "http://127.0.0.1:8083/hello"
          run_wrk "GET /users/42" "http://127.0.0.1:8083/users/42"
          run_wrk "POST /echo"    "http://127.0.0.1:8083/echo" -s .github/infra/bench_post.lua

          {
            echo ""
            echo "---"
            echo "> $(date -u '+%Y-%m-%d %H:%M UTC') · commit \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop Laravel Octane server
        if: always()
        run: |
          kill "${LARAVEL_PID}" 2>/dev/null || true
          cd /tmp/laravel-bench && php artisan octane:stop --server=swoole 2>/dev/null || true

# ─────────────────────────────────────────────────────────────────────────────
# Job 7: FrankenPHP comparison
# Go-based PHP app server (Caddy + PHP-ZTS). Worker mode: PHP boots once
# per worker and handles requests in a loop — no per-request startup cost.
# NOTE: FrankenPHP uses ZTS (thread-safe) PHP which disables OPcache JIT.
# The pre-built binary ships with its own PHP runtime — no system PHP needed.
# ─────────────────────────────────────────────────────────────────────────────
  bench-compare-frankenphp:
    name: FrankenPHP / HTTP Benchmark
    runs-on: ${{ github.event.inputs.runner || 'ubuntu-latest' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install wrk
        run: |
          if sudo apt-get install -y wrk 2>/dev/null; then
            echo "wrk installed via apt."
          else
            sudo apt-get install -y build-essential libssl-dev git
            git clone --depth 1 -b 4.2.0 https://github.com/wg/wrk /tmp/wrk
            make -C /tmp/wrk -j"$(nproc)"
            sudo install /tmp/wrk/wrk /usr/local/bin/wrk
          fi
          wrk --version 2>&1 | head -1 || true

      - name: Download FrankenPHP binary
        run: |
          # Use the /releases/latest/download/ redirect — no API call, no rate-limiting.
          echo "Downloading latest FrankenPHP binary..."
          curl -fsSL \
            "https://github.com/dunglas/frankenphp/releases/latest/download/frankenphp-linux-x86_64" \
            -o /usr/local/bin/frankenphp
          chmod +x /usr/local/bin/frankenphp
          frankenphp version 2>&1 | head -1 || true

      - name: Create worker script
        run: |
          mkdir -p /tmp/franken-bench
          NCPUS=$(nproc)
          INPUT_THREADS="${{ github.event.inputs.threads || '2' }}"
          WORKERS=$(( NCPUS - INPUT_THREADS - 1 ))
          [ "${WORKERS}" -lt 1 ] && WORKERS=1
          echo "FRANKEN_WORKERS_USED=${WORKERS}" >> "$GITHUB_ENV"

          # Named index.php so php_server's default try_files fallback
          # ({path} → {path}/ → /index.php) resolves and routes to the worker.
          cat > /tmp/franken-bench/index.php << 'PHPEOF'
          <?php
          ignore_user_abort(true);
          while (frankenphp_handle_request(function (): void {
              $uri    = $_SERVER['REQUEST_URI'];
              $method = $_SERVER['REQUEST_METHOD'];
              if ($method === 'GET' && $uri === '/health') {
                  echo 'ok';
                  return;
              }
              if ($method === 'GET' && $uri === '/hello') {
                  header('Content-Type: application/json');
                  echo json_encode(['message' => 'Hello, World!']);
                  return;
              }
              if ($method === 'GET' && preg_match('#^/users/(\d+)$#', $uri, $m)) {
                  header('Content-Type: application/json');
                  echo json_encode(['id' => (int) $m[1], 'name' => 'Test User']);
                  return;
              }
              if ($method === 'POST' && $uri === '/echo') {
                  header('Content-Type: application/octet-stream');
                  echo file_get_contents('php://input');
                  return;
              }
              http_response_code(404);
          })) {}
          PHPEOF

      - name: Start FrankenPHP server
        run: |
          frankenphp php-server \
            --listen :8084 \
            --root /tmp/franken-bench \
            --worker "/tmp/franken-bench/index.php,${FRANKEN_WORKERS_USED}" \
            > /tmp/franken.log 2>&1 &
          echo "FRANKEN_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for readiness
        run: |
          for i in $(seq 1 80); do
            curl -sf http://127.0.0.1:8084/health > /dev/null 2>&1 && echo "FrankenPHP ready." && exit 0
            sleep 0.5
          done
          echo "=== FrankenPHP startup log ===" && cat /tmp/franken.log && exit 1

      - name: Warmup
        run: |
          echo "Warming up FrankenPHP (5s, 50 concurrent)..."
          wrk -t1 -c50 -d5s http://127.0.0.1:8084/hello > /dev/null
          echo "Warmup complete."

      - name: Run wrk benchmarks
        env:
          DURATION:    ${{ github.event.inputs.duration    || '15' }}
          CONNECTIONS: ${{ github.event.inputs.connections || '200' }}
          THREADS:     ${{ github.event.inputs.threads     || '2' }}
        run: |
          NCPUS=$(nproc)
          FVER=$(frankenphp version 2>&1 | head -1 || echo "?")
          {
            echo "## FrankenPHP — HTTP Benchmark Results"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Runner | \`${{ github.event.inputs.runner || 'ubuntu-latest' }}\` |"
            echo "| vCPUs | ${NCPUS} |"
            echo "| FrankenPHP | ${FVER} |"
            echo "| Mode | Worker (PHP-ZTS, JIT unavailable) |"
            echo "| Workers | ${FRANKEN_WORKERS_USED} |"
            echo "| Duration | ${DURATION}s per route |"
            echo "| Connections | ${CONNECTIONS} concurrent |"
            echo "| wrk threads | ${THREADS} |"
            echo ""
            echo "| Route | Req/s | Latency (avg) | Transfer/s |"
            echo "|-------|------:|--------------:|-----------:|"
          } >> "$GITHUB_STEP_SUMMARY"

          run_wrk() {
            local label="$1" url="$2"; shift 2
            local out rps lat transfer
            out=$(wrk -t"${THREADS}" -c"${CONNECTIONS}" -d"${DURATION}s" "$@" "${url}" 2>&1)
            echo "=== ${label} ===" && echo "${out}" && echo ""
            rps=$(echo      "${out}" | grep -oP 'Requests/sec:\s+\K[\d.]+' || echo "?")
            lat=$(echo      "${out}" | grep -oP 'Latency\s+\K[\d.]+[µm]?s' | head -1 || echo "?")
            transfer=$(echo "${out}" | grep -oP 'Transfer/sec:\s+\K\S+' || echo "?")
            echo "| \`${label}\` | **${rps}** | ${lat} | ${transfer} |" >> "$GITHUB_STEP_SUMMARY"
          }

          run_wrk "GET /hello"    "http://127.0.0.1:8084/hello"
          run_wrk "GET /users/42" "http://127.0.0.1:8084/users/42"
          run_wrk "POST /echo"    "http://127.0.0.1:8084/echo" -s .github/infra/bench_post.lua

          {
            echo ""
            echo "---"
            echo "> $(date -u '+%Y-%m-%d %H:%M UTC') · commit \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop FrankenPHP server
        if: always()
        run: kill "${FRANKEN_PID}" 2>/dev/null || true


